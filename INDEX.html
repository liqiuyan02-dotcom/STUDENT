<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育智库 - 深度学生画像系统</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f9; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); padding: 20px; color: #333; line-height: 1.6; margin: 0; }
        .container { max-width: 1050px; margin: 0 auto; background: #fff; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        
        /* API 配置区 */
        .api-config { background: #fff5f5; padding: 15px 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #fed7d7; display: flex; align-items: center; gap: 15px; font-size: 14px; color: #c53030; }
        .api-config input { flex-grow: 1; padding: 10px; border: 1px solid #fc8181; border-radius: 6px; outline: none; transition: 0.3s; }
        .api-config input:focus { box-shadow: 0 0 0 3px rgba(245, 101, 101, 0.2); }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { color: var(--primary); margin-bottom: 8px; font-size: 28px; letter-spacing: 1px; }
        .header p { color: #7f8c8d; font-size: 15px; }

        h3 { border-left: 5px solid var(--accent); padding-left: 15px; margin-top: 35px; color: var(--primary); background: #f8f9fa; padding-block: 12px; border-radius: 0 6px 6px 0; font-size: 18px; }
        
        /* 响应式网格布局，适配长文本下拉框 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #4a5568; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: #fff; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(52,152,219,0.15); }
        input[readonly] { background-color: #f7fafc; color: #a0aec0; cursor: not-allowed; }
        
        /* 动态评估区高亮 */
        #dynamic_questions { background: #f0f7ff; padding: 25px; border-radius: 10px; border: 1px solid #bee3f8; margin-top: 15px; }

        .btn-group { margin-top: 40px; display: flex; gap: 20px; flex-wrap: wrap; }
        button { flex: 1; min-width: 200px; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 700; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gen { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        .btn-gen:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4); }
        .btn-gen:disabled { background: #a0aec0; cursor: not-allowed; box-shadow: none; transform: none; }
        .btn-export { background: var(--success); color: white; display: none; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }
        .btn-export:hover { background: #219653; transform: translateY(-2px); }
        
        /* 预览区样式 */
        #previewContainer { margin-top: 50px; display: none; }
        #previewBox { padding: 35px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); line-height: 1.8; color: #2d3748; }
        #previewBox h1 { color: var(--primary); border-bottom: 2px solid #edf2f7; padding-bottom: 12px; margin-top: 0; font-size: 26px; }
        #previewBox h2 { color: var(--accent); margin-top: 25px; font-size: 20px; }
        #previewBox h3 { background: none; border-left: none; padding-left: 0; color: #4a5568; font-size: 16px; margin-top: 20px; }
        #previewBox blockquote { border-left: 4px solid var(--accent); padding-left: 15px; margin: 15px 0; color: #718096; background: #f7fafc; padding-block: 10px; border-radius: 0 8px 8px 0; }
        #previewBox strong { color: #1a202c; }
        #previewBox ul, #previewBox ol { padding-left: 20px; }
        #previewBox li { margin-bottom: 8px; }
        
        .loading { display: none; text-align: center; padding: 30px; color: var(--accent); font-weight: bold; font-size: 18px; }
        .loading i { animation: spin 1.5s linear infinite; margin-right: 10px; font-size: 24px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="api-config">
        <i class="fas fa-key" style="font-size: 18px;"></i>
        <strong>API KEY:</strong>
        <input type="password" id="api_key" placeholder="在此填入 Gemini API Key (自动缓存在本地)">
    </div>

    <div class="header">
        <h1>学生成长画像建档系统</h1>
        <p><i class="fas fa-brain"></i> 六维能力评估 × AI 深度总结报告生成</p>
    </div>
    
    <form id="profileForm">
        <h3>一、学生快速检索</h3>
        <div class="grid">
            <div class="full-width">
                <label><i class="fas fa-search"></i> 选择现有学生 (自动加载基础信息及对应评估维度)</label>
                <select id="student_select" onchange="autoFillStudent()">
                    <option value="">-- 请选择学生快速填充 --</option>
                </select>
            </div>
            <div>
                <label>姓名</label>
                <input type="text" id="stu_name" required>
            </div>
            <div>
                <label>性别</label>
                <select id="stu_gender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div>
                <label>班级/课程</label>
                <input type="text" id="stu_class" readonly>
            </div>
            <div>
                <label>上课时间</label>
                <input type="text" id="stu_time" readonly>
            </div>
        </div>

        <h3>二、阶段深度评估 (基于6大核心维度)</h3>
        <div id="dynamic_questions" class="grid">
            <p style="color:#a0aec0; grid-column: 1/-1; text-align: center; font-size: 15px; padding: 20px 0;">
                <i class="fas fa-info-circle"></i> 请先在上方选择学生，系统将自动加载对应年龄段的评估问题。
            </p>
        </div>

        <h3>三、通用特质与核心关注点</h3>
        <div class="grid">
            <div>
                <label>气质类型</label>
                <select id="stu_temp">
                    <option value="平和型">平和型 (情绪稳定/温和/包容)</option>
                    <option value="活泼型">活泼型 (外向/反应快/易分心)</option>
                    <option value="力量型">力量型 (主见强/好胜/执行力高)</option>
                    <option value="完美型">完美型 (严谨/在意细节/易挫败)</option>
                </select>
            </div>
            <div>
                <label>家长参与度</label>
                <select id="parent_involve">
                    <option value="密切参与">密切参与 (高频沟通/非常重视)</option>
                    <option value="一般关注">一般关注 (定期了解即可)</option>
                    <option value="放手型">放手型 (完全交给机构/较少过问)</option>
                </select>
            </div>
            <div>
                <label>近期学业表现</label>
                <select id="academic">
                    <option value="优秀">优秀 (吸收快/能举一反三)</option>
                    <option value="中等" selected>中等 (平稳进步/能跟上进度)</option>
                    <option value="待提升">待提升 (理解较慢/需重点帮扶)</option>
                </select>
            </div>
            <div class="full-width">
                <label><i class="fas fa-pen-nib"></i> 补充关注点 (AI 将结合这些标签进行深度润色)</label>
                <textarea id="focus_tags" rows="3" placeholder="例如：最近几次课特别容易走神；虽然代码写得乱，但是很有创意；需要老师多给正向激励..."></textarea>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-gen" id="genBtn" onclick="generateAIProfile()">
                <i class="fas fa-magic"></i> ✨ 生成专业评估报告
            </button>
            <button type="button" id="downloadBtn" class="btn-export" onclick="downloadMD()">
                <i class="fas fa-file-download"></i> 导出 MD 文档
            </button>
        </div>
    </form>

    <div id="loading" class="loading">
        <i class="fas fa-spinner"></i> AI 专家正在整合 6 大维度数据，为您撰写深度报告...
    </div>

    <div id="previewContainer">
        <h3 style="background: none; border: none; padding: 0; margin-bottom: 20px;">
            <i class="fas fa-file-alt"></i> 报告预览
        </h3>
        <div id="previewBox"></div>
    </div>
</div>

<script>
    // 1. 学生数据库 (已更新所有最新修正的性别)
    const studentDB = [
        {name:"梁昕乔", sex:"女", class:"发现世界", time:"周四 19:00-20:00"},
        {name:"钟昀昊", sex:"男", class:"发现世界", time:"周四 19:00-20:00"},
        {name:"林瀚丞", sex:"男", class:"发现世界", time:"周六 09:00-10:00"},
        {name:"杨佳兴", sex:"男", class:"发现世界", time:"周六 09:00-10:00"},
        {name:"余韫", sex:"女", class:"发现世界", time:"周六 09:00-10:00"},
        {name:"林嘉铭", sex:"男", class:"发现世界", time:"周六 09:00-10:00"},
        {name:"李怡瞳", sex:"女", class:"AICODE-03", time:"周五 19:00-20:30"},
        {name:"沙佩琪", sex:"女", class:"AICODE-03", time:"周五 19:00-20:30"},
        {name:"黄榆斐", sex:"女", class:"AICODE-03", time:"周五 19:00-20:30"},
        {name:"陈昕柔", sex:"女", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"曾乐凯", sex:"男", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"李汶浩", sex:"男", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"李欣蓉", sex:"女", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"谢善诺", sex:"女", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"梁家铭", sex:"男", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"简思瑜", sex:"男", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"简思霖", sex:"女", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"黄晓瑜", sex:"女", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"罗钧龄", sex:"男", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"马悦然", sex:"女", class:"Wedo 创造世界", time:"周六 16:00-17:30"},
        {name:"郭景鸣", sex:"男", class:"Wedo 创造世界", time:"周六 16:00-17:30"},
        {name:"冯彦哲", sex:"男", class:"Wedo 创造世界", time:"周六 16:00-17:30"},
        {name:"吴浩洋", sex:"男", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"吴浩骏", sex:"男", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"王骏诚", sex:"男", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"洪一栩", sex:"男", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"邓琬曦", sex:"女", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"邓琬颖", sex:"女", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"方柳莫", sex:"女", class:"SPIKE02", time:"周日 10:30-12:00"}
    ];

    // 初始化：填充下拉菜单 & 读取本地缓存的 API Key
    window.onload = () => {
        const select = document.getElementById('student_select');
        // 按班级排序方便查找
        studentDB.sort((a,b) => a.class.localeCompare(b.class)).forEach((s, index) => {
            select.options.add(new Option(`[${s.class}] - ${s.name}`, index));
        });
        
        const cachedKey = localStorage.getItem('gemini_api_key');
        if(cachedKey) document.getElementById('api_key').value = cachedKey;
    };

    // 2. 自动填充与 6 维度动态问题加载
    function autoFillStudent() {
        const val = document.getElementById('student_select').value;
        if(val === "") return;
        const s = studentDB[val];
        document.getElementById('stu_name').value = s.name;
        document.getElementById('stu_gender').value = s.sex;
        document.getElementById('stu_class').value = s.class;
        document.getElementById('stu_time').value = s.time;
        
        renderDynamicQuestions(s.class);
    }

    function renderDynamicQuestions(className) {
        const box = document.getElementById('dynamic_questions');
        box.innerHTML = '';
        let questions = [];

        if(className.includes("发现世界")) {
            questions = [
                {id: 'q1', label: '1. 精细动作与手眼协调', opts: ['灵活 (精准捏取/对齐)','合格 (大块拼接顺畅)','待提升 (手部力量/准确度不足)']},
                {id: 'q2', label: '2. 语言表达与转述', opts: ['清晰 (能描述作品功能/故事)','基础 (能说出零件名称/短句)','较弱 (较少主动开口)']},
                {id: 'q3', label: '3. 专注时长与抗干扰', opts: ['极佳 (>15分钟沉浸)','正常 (5-15分钟)','易分心 (极易受外界干扰)']},
                {id: 'q4', label: '4. 社交互动意识', opts: ['合作型 (乐于分享/轮流)','平行型 (各玩各的,互不干扰)','冲突型 (易发生争抢/需要调解)']},
                {id: 'q5', label: '5. 情绪稳定性与抗挫', opts: ['积极稳定 (不怕拼错)','依赖型 (遇挫首选求助老师)','脆弱型 (遇挫易哭闹/发脾气/放弃)']},
                {id: 'q6', label: '6. 观察与模仿能力', opts: ['敏锐 (能自主发现图纸细节)','普通 (能跟随老师一步步做)','走马观花 (常漏掉关键步骤)']}
            ];
        } 
        else if(className.includes("Wedo")) {
            questions = [
                {id: 'q1', label: '1. 空间与立体结构感', opts: ['极佳 (能迅速将2D图纸转3D)','合格 (偶尔需要方向提示)','较弱 (常出现镜像/错位错误)']},
                {id: 'q2', label: '2. 编程逻辑启蒙', opts: ['深刻 (理解顺序与循环概念)','模仿 (能照猫画虎复现代码)','模糊 (对编程模块功能无概念)']},
                {id: 'q3', label: '3. 任务执行与坚持度', opts: ['沉浸式 (遇难主动尝试解决)','中等 (遇到困难易停滞等待)','需督促 (全程需要老师推着走)']},
                {id: 'q4', label: '4. 规则遵循与收纳', opts: ['自觉 (自主分类归还零件)','被动 (提醒后能做好收纳)','无序 (缺乏收纳与保护零件意识)']},
                {id: 'q5', label: '5. 同伴合作意识', opts: ['融洽 (能与搭档合理分工)','竞争 (偶尔争抢核心操作权)','孤立 (完全无法合作/排斥搭档)']},
                {id: 'q6', label: '6. 求知欲与探索力', opts: ['旺盛 (经常提问"为什么")','达标 (完成规定任务即止)','被动 (缺乏进一步探索的兴趣)']}
            ];
        }
        else if(className.includes("SPIKE")) {
            questions = [
                {id: 'q1', label: '1. 算法设计与逻辑', opts: ['独立设计 (含条件/多重循环)','提示后完成 (需点拨关键逻辑)','基础拼接 (仅能处理直线逻辑)']},
                {id: 'q2', label: '2. 工程排障 (Debugging)', opts: ['独立定位 (能找出软硬件Bug)','愿意尝试 (但常找错方向)','完全依赖 (遇错直接喊老师)']},
                {id: 'q3', label: '3. 软硬件结合认知', opts: ['透彻 (深刻理解传感器数值反馈)','套用 (知其然不知其所以然)','割裂 (代码与机械结构概念脱节)']},
                {id: 'q4', label: '4. 团队角色定位', opts: ['主导者 (架构师/核心开发)','执行者 (积极配合完成分配任务)','边缘化 (游离于团队作业之外)']},
                {id: 'q5', label: '5. 创新与优化意愿', opts: ['主动优化 (为作品增加新功能/结构)','偶尔尝试 (微调参数或外观)','拒绝改动 (按部就班,怕改坏)']},
                {id: 'q6', label: '6. 项目表达与复盘', opts: ['条理清晰 (能讲解运行原理)','引导表达 (需老师提问才能说出重点)','怯场混乱 (不知如何介绍自己的作品)']}
            ];
        }
        else if(className.includes("AICODE")) {
            questions = [
                {id: 'q1', label: '1. 抽象逻辑思维', opts: ['熟练 (轻松驾驭变量/函数/列表)','需具象化 (需生活案例辅助理解)','易混淆 (抽象概念理解极为吃力)']},
                {id: 'q2', label: '2. 代码规范与组织', opts: ['结构清晰 (命名规范,有模块化意识)','提醒后整理 (代码堆砌但能看懂)','面条式代码 (随意命名,结构混乱)']},
                {id: 'q3', label: '3. 项目规划能力', opts: ['谋定后动 (有伪代码/流程图意识)','边写边想 (走一步看一步)','毫无头绪 (无计划地胡乱尝试)']},
                {id: 'q4', label: '4. 自主解决问题途径', opts: ['善用工具 (优先查阅文档/搜索/报错日志)','请教同伴 (优先问同学)','依赖老师 (遇Bug停止思考直接求助)']},
                {id: 'q5', label: '5. AI 工具协同应用', opts: ['精准驾驭 (能编写优质Prompt引导AI)','简单对话 (索取现成答案/代码)','排斥/不习惯 (不愿尝试AI辅助)']},
                {id: 'q6', label: '6. 元认知与反思能力', opts: ['深度反思 (能准确评估自身代码优劣)','结果导向 (仅关注代码是否跑通)','无法解释 (写出来了但讲不明白原理)']}
            ];
        }

        questions.forEach(q => {
            let d = document.createElement('div');
            d.innerHTML = `<label title="${q.label}">${q.label}</label>
                           <select class="dynamic-val" data-label="${q.label}" id="${q.id}">
                           ${q.opts.map(o => `<option value="${o}">${o}</option>`).join('')}
                           </select>`;
            box.appendChild(d);
        });
    }

    // 3. AI 调用与全新 Prompt 策略
    let finalMD = "";
    async function generateAIProfile() {
        const key = document.getElementById('api_key').value.trim();
        if(!key) { alert("⚠️ 请在页面顶部填入 Gemini API Key"); return; }
        localStorage.setItem('gemini_api_key', key);

        const data = {
            name: document.getElementById('stu_name').value,
            class: document.getElementById('stu_class').value,
            temp: document.getElementById('stu_temp').value,
            academic: document.getElementById('academic').value,
            parent: document.getElementById('parent_involve').value,
            tags: document.getElementById('focus_tags').value
        };

        if(!data.name || !data.class) { alert("⚠️ 请先选择或填写学生基本信息"); return; }

        let dynamicInfo = "";
        document.querySelectorAll('.dynamic-val').forEach(el => {
            dynamicInfo += `- **${el.getAttribute('data-label')}**: ${el.value}\n`;
        });

        const loading = document.getElementById('loading');
        const previewContainer = document.getElementById('previewContainer');
        const previewBox = document.getElementById('previewBox');
        const genBtn = document.getElementById('genBtn');

        genBtn.disabled = true;
        loading.style.display = 'block';
        previewContainer.style.display = 'none';

        // 核心 AI 提示词（强化专业拆解与分析）
        const prompt = `你是一位资深教育心理专家和STEM教育评价专家。请根据以下详尽的调查问卷数据，为学生撰写一份专业的 Markdown 格式画像报告。

【一、 学生基础数据】

    // 4. 下载逻辑
    function downloadMD() {
        const name = document.getElementById('stu_name').value || "学生";
        const blob = new Blob([finalMD], { type: 'text/markdown;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `[画像]_${name}_${new Date().toISOString().slice(0,10)}.md`;
        a.click();
    }
